<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CyberTools API</title>
  <meta name="description" content="Free security utility API for bug bounty hunters, red teamers, and developers." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect fill='%23070909' width='32' height='32' rx='4'/%3E%3Ccircle cx='16' cy='16' r='11' fill='none' stroke='%23e63030' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='4' fill='%23e63030'/%3E%3Cline x1='16' y1='2' x2='16' y2='9' stroke='%23e63030' stroke-width='2'/%3E%3Cline x1='16' y1='23' x2='16' y2='30' stroke='%23e63030' stroke-width='2'/%3E%3Cline x1='2' y1='16' x2='9' y2='16' stroke='%23e63030' stroke-width='2'/%3E%3Cline x1='23' y1='16' x2='30' y2='16' stroke='%23e63030' stroke-width='2'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#070909;--surface:#0d0f0f;--surface2:#121515;
      --border:rgba(220,38,38,0.13);--border-h:rgba(220,38,38,0.38);
      --red:#e63030;--red-dim:rgba(220,38,38,0.08);--red-glow:rgba(220,38,38,0.22);
      --text:#ddd5d5;--text-dim:#6b4a4a;--text-muted:#3b2424;--radius:10px;
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(220,38,38,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(220,38,38,.025) 1px,transparent 1px);background-size:32px 32px;pointer-events:none;z-index:0}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:2px}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes dots{0%,60%,100%{opacity:.2;transform:scale(.75)}30%{opacity:1;transform:scale(1)}}
    @keyframes chatOpen{from{opacity:0;transform:scale(.88) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}

    nav{position:sticky;top:0;z-index:100;background:rgba(7,9,9,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
    .logo{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--red);text-shadow:0 0 18px var(--red-glow);display:flex;align-items:center;gap:10px}
    .logo-dot{width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 10px var(--red);display:inline-block;animation:blink 2s step-end infinite}
    .nav-links{display:flex;gap:6px}
    .nav-link{padding:5px 12px;border-radius:4px;font-size:.68rem;color:var(--text-dim);text-decoration:none;border:1px solid transparent;letter-spacing:1px;text-transform:uppercase;transition:all .15s}
    .nav-link:hover{color:var(--red);border-color:var(--border-h);background:var(--red-dim)}

    .app{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 49px);position:relative;z-index:1}
    .left{border-right:1px solid var(--border);padding:20px 16px;display:flex;flex-direction:column;gap:16px;position:sticky;top:49px;height:calc(100vh - 49px);overflow-y:auto}
    .left::-webkit-scrollbar{width:3px}
    .panel-label{font-size:.58rem;letter-spacing:3px;text-transform:uppercase;color:var(--text-muted);margin-bottom:7px}
    .target-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--red);font-family:'JetBrains Mono',monospace;font-size:.8rem;outline:none;caret-color:var(--red);transition:border-color .2s,box-shadow .2s}
    .target-input:focus{border-color:var(--border-h);box-shadow:0 0 0 2px var(--red-dim)}
    .target-input::placeholder{color:var(--text-muted)}
    .btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
    .btn-full{grid-column:1/-1}
    .action-btn{padding:9px 8px;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;width:100%}
    .action-btn:hover{border-color:var(--border-h);color:var(--red);background:var(--red-dim)}
    .action-btn.primary{background:var(--red-dim);border-color:var(--border-h);color:var(--red)}
    .action-btn.active{background:var(--red-dim);border-color:var(--border-h);color:var(--red);box-shadow:0 0 10px var(--red-dim)}
    .action-btn:disabled{opacity:.38;cursor:not-allowed}
    .divider{height:1px;background:var(--border);margin:2px 0}
    .payload-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
    .payload-tab{padding:3px 8px;border-radius:4px;font-size:.62rem;letter-spacing:.5px;text-transform:uppercase;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .15s}
    .payload-tab.active{border-color:var(--border-h);background:var(--red-dim);color:var(--red)}
    .stat-pill{display:flex;justify-content:space-between;align-items:center;padding:5px 10px;background:var(--surface2);border-radius:6px;border:1px solid var(--border);font-size:.68rem}
    .stat-pill span:first-child{color:var(--text-muted);letter-spacing:1px;text-transform:uppercase}
    .stat-pill span:last-child{color:var(--red);font-weight:500}

    .right{padding:22px 26px;overflow-y:auto;height:calc(100vh - 49px);position:relative;z-index:1}
    .output-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:13px;border-bottom:1px solid var(--border)}
    .output-label{font-size:.58rem;letter-spacing:3px;text-transform:uppercase;color:var(--text-muted)}
    .output-meta{display:flex;gap:14px;font-size:.63rem;color:var(--text-muted);letter-spacing:1px}
    .output-meta span{color:var(--border-h)}

    /* Loading, empty, error states */
    .state-center{display:flex;flex-direction:column;align-items:center;justify-content:center;height:70vh;gap:16px;color:var(--text-muted)}
    .spinner{width:38px;height:38px;border-radius:50%;border:2px solid var(--border);border-top-color:var(--red);animation:spin .8s linear infinite}
    .scanning{font-size:.62rem;letter-spacing:2px;text-transform:uppercase;animation:blink 1.5s step-end infinite}
    .empty-icon{font-size:2.5rem;opacity:.2}

    /* Result sections */
    .section{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;animation:fadeIn .25s ease}
    .section-header{width:100%;display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--surface);border:none;color:var(--text-dim);cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:1px;text-transform:uppercase}
    .section-body{padding:12px 14px;background:var(--bg);border-top:1px solid var(--border)}
    .kv-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:.76rem}
    .kv-row:last-child{border-bottom:none}
    .kv-label{color:var(--text-dim);letter-spacing:1px}
    .kv-val{color:var(--text);font-weight:500;text-align:right;word-break:break-all;max-width:65%}
    .kv-val.good{color:#4ade80}.kv-val.bad{color:var(--red)}.kv-val.warn{color:#fbbf24}
    .hint-item{display:flex;gap:10px;align-items:flex-start;padding:5px 0;font-size:.75rem}
    .hint-item .icon{flex-shrink:0}.hint-item.ok .icon{color:#4ade80}.hint-item.warn .icon{color:#fbbf24}.hint-item.bad .icon{color:var(--red)}
    .summary-item{display:flex;gap:10px;align-items:flex-start;padding:4px 0;font-size:.75rem}
    .summary-item .arr{color:var(--red);flex-shrink:0}
    .next-step{display:flex;gap:10px;align-items:flex-start;padding:5px 0;font-size:.75rem}
    .step-num{background:var(--red);color:#fff;border-radius:3px;padding:1px 5px;font-size:.65rem;font-weight:700;flex-shrink:0}
    .path-row{display:flex;justify-content:space-between;padding:4px 8px;border-radius:4px;margin-bottom:3px;background:var(--surface2);font-size:.73rem}
    .path-status{font-weight:700}
    .payload-item{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-radius:6px;margin-bottom:4px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;gap:8px;transition:all .15s}
    .payload-item:hover{border-color:var(--border-h);background:var(--red-dim)}
    .payload-item code{color:var(--red);font-size:.72rem;word-break:break-all;flex:1}
    .payload-label{color:var(--text-muted);font-size:.65rem;letter-spacing:1px;flex-shrink:0}
    .error-box{border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;background:rgba(248,113,113,.08);margin:24px}
    .error-title{font-size:.68rem;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:8px}

    /* Floating chat */
    #chat-btn{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:var(--red);border:2px solid rgba(220,38,38,.5);box-shadow:0 4px 20px rgba(220,38,38,.45);cursor:pointer;z-index:9999;display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:#fff;transition:all .22s cubic-bezier(.34,1.56,.64,1)}
    #chat-btn.open{background:#1a0808;color:var(--red);transform:rotate(45deg)}
    #chat-popup{position:fixed;bottom:88px;right:24px;width:360px;height:540px;background:#0d0f0f;border:1px solid rgba(220,38,38,.25);border-radius:18px;box-shadow:0 24px 60px rgba(0,0,0,.7);display:flex;flex-direction:column;z-index:9998;overflow:hidden;animation:chatOpen .22s cubic-bezier(.34,1.56,.64,1)}
    #chat-popup.hidden{display:none}
    .chat-header{padding:14px 16px 12px;background:linear-gradient(135deg,#1a0808 0%,#0d0f0f 100%);border-bottom:1px solid rgba(220,38,38,.15);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .chat-avatar{width:36px;height:36px;border-radius:50%;background:rgba(220,38,38,.15);border:2px solid rgba(220,38,38,.4);display:flex;align-items:center;justify-content:center;font-size:1rem;color:var(--red)}
    .chat-name{font-size:.82rem;font-weight:700;color:#f0e0e0;font-family:'Syne',sans-serif;letter-spacing:.5px}
    .chat-status{display:flex;align-items:center;gap:5px;margin-top:2px}
    .chat-status-dot{width:6px;height:6px;border-radius:50%;background:#4ade80}
    .chat-status-txt{font-size:.62rem;color:#6b2a2a}
    .chat-actions{display:flex;gap:6px}
    .chat-icon-btn{background:none;border:1px solid rgba(220,38,38,.2);border-radius:6px;padding:4px 9px;font-size:.6rem;letter-spacing:1px;text-transform:uppercase;color:#6b2a2a;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .15s}
    .chat-icon-btn:hover{border-color:rgba(220,38,38,.5);color:var(--red)}
    .chat-messages{flex:1;overflow-y:auto;padding:14px 14px 6px;display:flex;flex-direction:column}
    .chat-messages::-webkit-scrollbar{width:3px}
    .chat-msg-user{display:flex;justify-content:flex-end;margin-bottom:12px}
    .chat-msg-user .bubble{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3);border-radius:14px 14px 3px 14px;padding:9px 13px;font-size:.8rem;line-height:1.55;color:#f0e0e0;max-width:240px;word-break:break-word}
    .chat-msg-user .ts{font-size:.58rem;color:#4a2a2a;text-align:right;margin-top:3px}
    .chat-msg-bot{display:flex;gap:9px;margin-bottom:12px;align-items:flex-start}
    .bot-avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;background:rgba(220,38,38,.12);border:1.5px solid rgba(220,38,38,.35);display:flex;align-items:center;justify-content:center;font-size:.75rem;color:var(--red);font-weight:700;margin-top:2px}
    .bot-name{font-size:.62rem;color:#6b2a2a;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
    .bot-bubble{background:#121515;border:1px solid #1e0808;border-radius:3px 14px 14px 14px;padding:10px 13px;font-size:.78rem;line-height:1.65;color:#ddd5d5;max-width:260px;word-break:break-word;white-space:pre-wrap}
    .chat-ts{font-size:.58rem;color:#4a2a2a;margin-top:3px;padding-left:2px}
    .typing-dots{display:flex;gap:5px;padding:10px 14px;align-items:center}
    .dot-anim{width:6px;height:6px;border-radius:50%;background:var(--red);display:inline-block;animation:dots 1.2s ease-in-out infinite}
    .chat-suggestions{padding:8px 14px;border-top:1px solid rgba(220,38,38,.08);display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0}
    .sugg-btn{padding:4px 9px;border-radius:20px;font-size:.62rem;border:1px solid rgba(220,38,38,.18);background:transparent;color:#6b4a4a;cursor:pointer;font-family:'JetBrains Mono',monospace;white-space:nowrap;transition:all .15s}
    .sugg-btn:hover{border-color:rgba(220,38,38,.45);color:var(--red)}
    .chat-input-area{padding:10px 14px 14px;border-top:1px solid rgba(220,38,38,.1);display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
    .chat-textarea{flex:1;background:#121515;border:1px solid rgba(220,38,38,.15);border-radius:10px;padding:8px 11px;color:#ddd5d5;font-family:'JetBrains Mono',monospace;font-size:.76rem;outline:none;resize:none;caret-color:var(--red);line-height:1.5;transition:border-color .15s}
    .chat-textarea:focus{border-color:rgba(220,38,38,.45)}
    .chat-send{width:38px;height:38px;border-radius:10px;flex-shrink:0;background:var(--red);border:none;color:#fff;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .chat-send:disabled{background:#1a0808;color:#4a2020;cursor:not-allowed}
  </style>
</head>
<body>
  <nav>
    <div class="logo">
      <span class="logo-dot"></span>
      CyberTools
    </div>
    <div class="nav-links">
      <a href="/docs" target="_blank" class="nav-link">Docs</a>
      <a href="https://github.com/vessel-69/cybertools-api" target="_blank" class="nav-link">GitHub</a>
    </div>
  </nav>

  <div class="app">
    <!-- Left panel -->
    <aside class="left">
      <div>
        <div class="panel-label">Target</div>
        <input id="target" type="text" class="target-input" placeholder="example.com" onkeydown="if(event.key==='Enter')run('recon')">
      </div>
      <div>
        <div class="panel-label">Commands</div>
        <div class="btn-grid">
          <button class="action-btn primary btn-full" onclick="run('workflow')">⚡ Workflow</button>
          <button class="action-btn" onclick="run('recon')">◎ Recon</button>
          <button class="action-btn" onclick="run('analyze')">⟳ Analyze</button>
          <button class="action-btn" onclick="run('bb-scan')">◈ BB Scan</button>
          <button class="action-btn btn-full" onclick="run('last-scan')">⊙ Last Scan</button>
        </div>
      </div>
      <div class="divider"></div>
      <div>
        <div class="panel-label">Workflows</div>
        <div class="btn-grid">
          <button class="action-btn" onclick="run('express')">🚀 Express</button>
          <button class="action-btn" onclick="run('bugbounty')">◉ Bug Bounty</button>
          <button class="action-btn" onclick="run('subdomains')">⊹ Subdomains</button>
          <button class="action-btn" onclick="run('api')">⊠ API Scan</button>
        </div>
      </div>
      <div class="divider"></div>
      <div>
        <div class="panel-label">Recon Tools</div>
        <div class="btn-grid">
          <button class="action-btn btn-full" onclick="run('expand')">⊞ Expand</button>
          <button class="action-btn" onclick="run('endpoints')">⊡ Endpoints</button>
          <button class="action-btn" onclick="run('params')">⊟ Params</button>
        </div>
      </div>
      <div class="divider"></div>
      <div>
        <div class="panel-label">Payloads</div>
        <div class="payload-tabs" id="payload-tabs"></div>
        <button class="action-btn btn-full" onclick="run('payloads')">◇ Get Payloads</button>
      </div>
      <div class="divider"></div>
      <div>
        <div class="panel-label">Last Scan Stats</div>
        <div style="display:flex;flex-direction:column;gap:5px">
          <div class="stat-pill"><span>IP</span><span id="stat-ip">—</span></div>
          <div class="stat-pill"><span>Status</span><span id="stat-status">—</span></div>
          <div class="stat-pill"><span>SSL</span><span id="stat-ssl">—</span></div>
        </div>
      </div>
    </aside>

    <!-- Right panel -->
    <main class="right" id="right-panel">
      <div class="output-header">
        <div class="output-label" id="output-label">Output</div>
        <div class="output-meta"><span>17 endpoints</span>|<span>0 auth required</span>|<span>∞ free</span></div>
      </div>
      <div id="result-area">
        <div class="state-center">
          <div class="empty-icon">⌖</div>
          <div style="font-size:.72rem;letter-spacing:2px;text-transform:uppercase">Enter a target and run a command</div>
          <div style="font-size:.63rem;opacity:.5;text-align:center;max-width:280px;line-height:1.9">
            Start with <strong style="color:var(--red)">Workflow</strong> for a full scan or <strong style="color:var(--red)">Recon</strong> for quick intel.
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Floating chat -->
  <div id="chat-popup" class="hidden">
    <div class="chat-header">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="chat-avatar">⌖</div>
        <div>
          <div class="chat-name">CyberTools AI</div>
          <div class="chat-status"><span class="chat-status-dot"></span><span class="chat-status-txt">Online · Red Team Assistant</span></div>
        </div>
      </div>
      <div class="chat-actions">
        <button class="chat-icon-btn" onclick="clearChat()">CLR</button>
        <button class="chat-icon-btn" onclick="toggleChat()">✕</button>
      </div>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-suggestions" id="chat-suggestions"></div>
    <div class="chat-input-area">
      <textarea class="chat-textarea" id="chat-input" rows="2" placeholder="Ask about security, exploits, this API…" onkeydown="chatKey(event)"></textarea>
      <button class="chat-send" id="chat-send" onclick="chatSend()">▸</button>
    </div>
  </div>
  <button id="chat-btn" onclick="toggleChat()">⌖</button>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let _payloadType = 'xss';
let _activeCmd   = null;
let _chatOpen    = false;
let _chatHistory = [];
let _chatThinking = false;

const PAYLOAD_TYPES = ['xss','sqli','lfi','ssrf','open_redirect','idor'];
const SUGGESTIONS   = ['How do I find XSS?','What does /bb-scan do?','How to test IDOR?','SQLi payloads?','How to find subdomains?'];

// ── Init ──────────────────────────────────────────────────────────────────────
(function init() {
  const tabs = document.getElementById('payload-tabs');
  PAYLOAD_TYPES.forEach(pt => {
    const b = document.createElement('button');
    b.className = 'payload-tab' + (pt===_payloadType?' active':'');
    b.textContent = pt; b.onclick = () => { _payloadType=pt; tabs.querySelectorAll('.payload-tab').forEach(x=>x.classList.remove('active')); b.classList.add('active'); };
    tabs.appendChild(b);
  });

  const msgs = document.getElementById('chat-messages');
  msgs.innerHTML = botBubble("Hey! I'm CyberTools AI — your red team assistant. Ask me about bug bounty, web security, or how to use any feature of this API.", now());

  const sugg = document.getElementById('chat-suggestions');
  SUGGESTIONS.slice(0,3).forEach(s => {
    const b = document.createElement('button'); b.className='sugg-btn'; b.textContent=s;
    b.onclick=()=>{ document.getElementById('chat-input').value=s; chatSend(); }; sugg.appendChild(b);
  });
})();

// ── API helpers ───────────────────────────────────────────────────────────────
const BASE = '';
function getTarget(){ return document.getElementById('target').value.trim(); }
function url(t){ return t.startsWith('http') ? t : 'https://'+t; }

async function apiFetch(path) {
  const r = await fetch(BASE+path); const d = await r.json();
  if(!r.ok) throw new Error(d.detail||JSON.stringify(d)); return d;
}

// ── Commands ──────────────────────────────────────────────────────────────────
async function run(cmd) {
  const t = getTarget();
  if(!t && !['last-scan','payloads'].includes(cmd)) return;
  _activeCmd = cmd;
  document.getElementById('output-label').textContent = 'Output › '+cmd;
  showLoading('scanning target...');
  try {
    let d;
    if(cmd==='recon')         d = await apiFetch('/recon?domain='+enc(t));
    else if(cmd==='analyze')  d = await apiFetch('/analyze-url?url='+enc(url(t)));
    else if(cmd==='bb-scan')  d = await apiFetch('/bb-scan?url='+enc(url(t)));
    else if(cmd==='workflow')     d = await apiFetch('/workflow?target='+enc(t));
    else if(cmd==='express')      d = await apiFetch('/workflows/express?target='+enc(t));
    else if(cmd==='bugbounty')    d = await apiFetch('/workflows/bugbounty?target='+enc(t));
    else if(cmd==='subdomains')   d = await apiFetch('/workflows/subdomains?domain='+enc(t));
    else if(cmd==='api')          d = await apiFetch('/workflows/api?url='+enc(url(t)));
    else if(cmd==='expand')       d = await apiFetch('/expand?domain='+enc(t));
    else if(cmd==='endpoints')    d = await apiFetch('/endpoints?url='+enc(url(t)));
    else if(cmd==='params')       d = await apiFetch('/params?url='+enc(url(t)));
    else if(cmd==='payloads')     d = await apiFetch('/payloads?type='+enc(_payloadType));
    else if(cmd==='last-scan')    d = await apiFetch('/last-scan');
    renderResult(cmd, d);
    if(['recon','workflow'].includes(cmd)) updateStats(d);
  } catch(e) { showError(e.message); }
}

function enc(s){ return encodeURIComponent(s); }

// ── Render ────────────────────────────────────────────────────────────────────
function showLoading(msg) {
  document.getElementById('result-area').innerHTML =
    `<div class="state-center"><div class="spinner"></div><div style="font-size:.75rem;color:var(--text-dim);letter-spacing:1px">${msg}</div><div class="scanning">scanning target...</div></div>`;
}
function showError(msg) {
  document.getElementById('result-area').innerHTML =
    `<div class="error-box"><div class="error-title">✗ Error</div><div style="font-size:.76rem;line-height:1.6">${esc(msg)}</div></div>`;
}

function renderResult(cmd, d) {
  const area = document.getElementById('result-area');
  area.innerHTML = '';

  if(cmd==='recon') {
    area.appendChild(section('◉ Host Info', kvTable([
      ['Domain',d.domain],['IP',d.ip,'good'],['Protocol',(d.protocol||'').toUpperCase()],
      ['Status',d.status_code, d.status_code<400?'good':'bad']
    ]) + sslBlock(d.ssl)));
    area.appendChild(section('◉ Security Headers', d.missing_security_headers?.length
      ? d.missing_security_headers.map(h=>hint('✗','bad',`Missing: ${h}`)).join('')
      : hint('✓','ok','All major security headers present.')));
    area.appendChild(section('◉ DNS Records', dnsBlock(d.dns)));
    if(d.tech_hints?.length) area.appendChild(section('◉ Tech Stack', d.tech_hints.map(t=>bullet(t)).join('')));
    area.appendChild(section('◉ Smart Summary', summaryList(d.smart_summary)));
    area.appendChild(section('◉ Next Steps', nextSteps(d.next_steps)));

  } else if(cmd==='analyze') {
    area.appendChild(section('◉ Redirect Chain', (d.redirect_chain||[]).map(h=>pathRow(h.url,h.status)).join('') + kvTable([['Final URL',d.final_url],['Final Status',d.final_status]])));
    area.appendChild(section('◉ Misconfigurations', d.misconfig_hints?.length ? d.misconfig_hints.map(h=>hint('✗','bad',h)).join('') : hint('✓','ok','No misconfigurations found.')));
    area.appendChild(section('◉ Smart Summary', summaryList(d.smart_summary)));
    area.appendChild(section('◉ Next Steps', nextSteps(d.next_steps)));

  } else if(cmd==='bb-scan') {
    const found = d.interesting_paths||[];
    area.appendChild(section(`◉ Interesting Paths (${found.length})`, found.map(p=>pathRow(p.path,p.status)).join('') || '<div style="color:var(--text-muted);font-size:.75rem">None found.</div>'));
    area.appendChild(section('◉ Bug Bounty Hints', (d.bug_bounty_hints||[]).map(h=>{
      const t = h.includes('CRITICAL')?'bad':h.includes('HIGH')?'warn':'ok';
      return hint('›',t,h);
    }).join('')));
    area.appendChild(section('◉ Next Steps', nextSteps(d.next_steps)));

  } else if(cmd==='expand') {
    const live = (d.subdomains||[]).filter(s=>s.live);
    const dead = (d.subdomains||[]).filter(s=>!s.live);
    area.appendChild(section('◉ Overview', kvTable([['Domain',d.domain],['Live',d.live_count,'good'],['Sources',(d.sources||[]).join(', ')]])));
    area.appendChild(section(`◉ Live Subdomains (${live.length})`, live.map(s=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:.74rem"><span style="color:var(--red)">● ${esc(s.subdomain)}</span><span style="color:var(--text-muted)">${esc(s.ip||'')}</span></div>`).join('') || '<div style="color:var(--text-muted);font-size:.75rem">None found.</div>'));
    if(dead.length) area.appendChild(section(`◉ Non-resolving (${dead.length})`, dead.map(s=>`<div style="padding:3px 0;font-size:.73rem;color:var(--text-muted);border-bottom:1px solid var(--border)">○ ${esc(s.subdomain)}</div>`).join(''), true));
    area.appendChild(section('◉ Next Steps', nextSteps(d.next_steps)));

  } else if(cmd==='endpoints') {
    const eps = d.endpoints||[];
    const typeColor = {sensitive:'var(--red)',admin:'var(--red)',api:'#4ade80',auth:'#fbbf24',monitoring:'#fbbf24',other:'var(--text-dim)'};
    area.appendChild(section('◉ Overview', kvTable([['Probed',d.paths_probed],['Found',d.endpoints_found,'good']])));
    const grouped = {};
    eps.forEach(ep=>{ if(!grouped[ep.type]) grouped[ep.type]=[]; grouped[ep.type].push(ep); });
    const epHtml = Object.entries(grouped).map(([type,list])=>`
      <div style="margin-bottom:10px"><div style="font-size:.62rem;letter-spacing:2px;text-transform:uppercase;color:${typeColor[type]||'var(--text-dim)'};margin-bottom:4px">${type}</div>
      ${list.map(ep=>pathRow(ep.path,ep.status)).join('')}</div>`).join('');
    area.appendChild(section(`◉ Found Endpoints (${eps.length})`, epHtml || '<div style="color:var(--text-muted);font-size:.75rem">None found.</div>'));
    area.appendChild(section('◉ Next Steps', nextSteps(d.next_steps)));

  } else if(cmd==='params') {
    const interesting = d.interesting||[];
    area.appendChild(section('◉ Overview', kvTable([['Tested',d.params_tested],['Interesting',d.interesting?.length||0,'warn'],['High Risk',d.high_risk?.length||0,'bad']])));
    area.appendChild(section(`◉ Interesting Parameters (${interesting.length})`, interesting.map(p=>`
      <div style="padding:8px 0;border-bottom:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <span style="color:${p.risk==='high'?'var(--red)':'#fbbf24'};font-size:.65rem;text-transform:uppercase;border:1px solid currentColor;padding:1px 6px;border-radius:3px">${p.risk}</span>
          <code style="color:var(--red);font-size:.78rem;font-weight:600">?${esc(p.name)}=FUZZ</code>
        </div>
        <div style="font-size:.71rem;color:var(--text-dim);padding-left:4px">↳ ${esc(p.test)}</div>
      </div>`).join('') || '<div style="color:var(--text-muted);font-size:.75rem">No interesting params found.</div>'));
    area.appendChild(section('◉ Next Steps', nextSteps(d.next_steps)));

  } else if(cmd==='payloads') {
    area.appendChild(section(`◉ ${(d.type||'').toUpperCase()} Payloads (${d.count})`,
      `<div style="font-size:.72rem;color:var(--text-muted);margin-bottom:12px">${esc(d.description||'')} · Click to copy.</div>` +
      (d.payloads||[]).map(p=>`<div class="payload-item" onclick="navigator.clipboard.writeText(this.dataset.p);this.style.borderColor='var(--border-h)';setTimeout(()=>this.style.borderColor='',1200)" data-p="${esc(p.payload)}"><code>${esc(p.payload)}</code><span class="payload-label">${esc(p.label||'')}</span></div>`).join('')));
    area.appendChild(section('◉ Usage Tips', nextSteps(d.usage_tips)));

  } else if(cmd==='last-scan') {
    area.appendChild(section(`◉ Last Scan — ${esc(d.key||'')}`, kvTable([['Target',d.key],['Timestamp',d.timestamp]])));
    const summary = (d.data||{}).smart_summary||(d.data?.recon||{}).smart_summary||[];
    if(summary.length) area.appendChild(section('◉ Summary', summaryList(summary)));

  } else if(cmd==='workflow') {
    area.appendChild(section(`◉ Full Workflow — ${esc(d.target||'')}`, kvTable([['Elapsed',d.elapsed_seconds+'s','good'],['IP',d.recon?.ip||'—'],['Status',d.recon?.status_code]])));
    area.appendChild(section('◉ Smart Summary', summaryList(d.smart_summary)));
    const paths = d.bb_scan?.interesting_paths||[];
    area.appendChild(section(`◉ Interesting Paths (${paths.length})`, paths.map(p=>pathRow(p.path,p.status)).join('') || '<div style="color:var(--text-muted);font-size:.75rem">None found.</div>'));
    const eps = d.endpoints?.endpoints||[];
    area.appendChild(section(`◉ Endpoints Found (${eps.length})`, eps.slice(0,8).map(ep=>pathRow(ep.path,ep.status)).join(''), eps.length===0));
    const iparams = d.params?.interesting||[];
    if(iparams.length) area.appendChild(section(`◉ Injectable Params (${iparams.length})`, iparams.map(p=>`<div style="padding:5px 0;border-bottom:1px solid var(--border);font-size:.74rem"><code style="color:var(--red)">?${esc(p.name)}=</code> — <span style="color:var(--text-dim)">${esc(p.test)}</span></div>`).join('')));
    area.appendChild(section('◉ Next Steps', nextSteps(d.next_steps)));

  } else if(cmd==='express') {
    area.appendChild(section(`◉ Express Workflow`, kvTable([['Elapsed',d.elapsed_seconds+'s','good'],['IP',d.recon?.ip],['Status',d.recon?.status_code]])));
    if(d.analysis?.misconfig_hints?.length) area.appendChild(section('◉ Misconfigs', d.analysis.misconfig_hints.map(h=>hint('✗','bad',h)).join('')));
    area.appendChild(section('◉ Summary', summaryList(d.smart_summary)));
    area.appendChild(section('◉ Next Steps', nextSteps(d.next_steps)));

  } else if(cmd==='bugbounty') {
    area.appendChild(section(`◉ Bug Bounty Workflow`, kvTable([['Elapsed',d.elapsed_seconds+'s','good'],['IP',d.recon?.ip]])));
    const paths2 = d.bb_scan?.interesting_paths||[];
    area.appendChild(section(`◉ Interesting Paths (${paths2.length})`, paths2.map(p=>pathRow(p.path,p.status)).join('') || '<div style="color:var(--text-muted);font-size:.75rem">None found.</div>'));
    if(d.recommended_payloads?.length) area.appendChild(section('◉ Recommended Payloads', d.recommended_payloads.map(pt=>`<div style="padding:4px 0;display:flex;gap:8px"><span style="color:var(--red)">◇</span><span style="text-transform:uppercase;letter-spacing:1px;font-size:.74rem">${esc(pt)}</span></div>`).join('')));
    area.appendChild(section('◉ Next Steps', nextSteps(d.next_steps)));

  } else if(cmd==='subdomains') {
    const live2=(d.expansion?.subdomains||[]).filter(s=>s.live);
    area.appendChild(section('◉ Subdomains Workflow', kvTable([['Elapsed',d.elapsed_seconds+'s','good'],['Live found',d.expansion?.live_count||0,'good'],['Sources',(d.expansion?.sources||[]).join(', ')]])));
    area.appendChild(section(`◉ Live Subdomains (${live2.length})`, live2.map(s=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:.74rem"><span style="color:var(--red)">● ${esc(s.subdomain)}</span><span style="color:var(--text-muted)">${esc(s.ip||'')}</span></div>`).join('') || '<div style="color:var(--text-muted);font-size:.75rem">None found.</div>'));
    area.appendChild(section('◉ Next Steps', nextSteps(d.next_steps)));

  } else if(cmd==='api') {
    area.appendChild(section('◉ API Scan Workflow', kvTable([['Elapsed',d.elapsed_seconds+'s','good'],['API endpoints',d.api_endpoints_found,'good'],['Total endpoints',d.endpoints?.endpoints_found||0],['Injectable params',d.params?.interesting?.length||0,'warn']])));
    const apiEps=(d.endpoints?.endpoints||[]).filter(e=>e.type==='api');
    if(apiEps.length) area.appendChild(section(`◉ API Endpoints (${apiEps.length})`, apiEps.map(ep=>pathRow(ep.path,ep.status)).join('')));
    area.appendChild(section('◉ Next Steps', nextSteps(d.next_steps)));
  }
}

// ── HTML helpers ──────────────────────────────────────────────────────────────
function section(title, body, collapsed=false) {
  const el = document.createElement('div'); el.className='section';
  const chevron = collapsed ? '▸' : '▾';
  const bodyId = 'sec-'+Math.random().toString(36).slice(2);
  el.innerHTML = `<button class="section-header" onclick="toggleSection(this,'${bodyId}')"><span>${esc(title)}</span><span id="chev-${bodyId}">${chevron}</span></button><div class="section-body" id="${bodyId}" ${collapsed?'style="display:none"':''}>${body}</div>`;
  return el;
}
function toggleSection(btn, id) {
  const body = document.getElementById(id);
  const chev = document.getElementById('chev-'+id);
  const hidden = body.style.display==='none';
  body.style.display = hidden?'':'none';
  chev.textContent = hidden?'▾':'▸';
}
function kvTable(rows) {
  return rows.map(([k,v,tone=''])=>`<div class="kv-row"><span class="kv-label">${esc(k)}</span><span class="kv-val ${tone}">${esc(String(v??'—'))}</span></div>`).join('');
}
function sslBlock(ssl) {
  if(!ssl) return '';
  return `<div style="margin-top:12px">${kvTable([['SSL Valid',ssl.valid?'Yes':'No',ssl.valid?'good':'bad'],['Expires',ssl.expires||'—'],['Days Left',ssl.days_remaining,ssl.days_remaining>30?'good':'bad'],['Issuer',ssl.issuer]])}</div>`;
}
function dnsBlock(dns) {
  if(!dns||!Object.keys(dns).length) return '<div style="color:var(--text-muted);font-size:.75rem">No DNS records.</div>';
  return Object.entries(dns).map(([t,r])=>`<div class="kv-row"><span class="kv-label">${t}</span><span class="kv-val" style="font-size:.7rem">${esc((r||[]).slice(0,3).join(', '))}</span></div>`).join('');
}
function hint(icon, tone, text) {
  return `<div class="hint-item ${tone}"><span class="icon">${icon}</span><span>${esc(text)}</span></div>`;
}
function bullet(text) {
  return `<div class="summary-item"><span class="arr">›</span><span>${esc(text)}</span></div>`;
}
function summaryList(items) {
  return (items||[]).map(s=>bullet(s)).join('') || '<div style="color:var(--text-muted);font-size:.75rem">No summary.</div>';
}
function nextSteps(items) {
  return (items||[]).map((s,i)=>`<div class="next-step"><span class="step-num">${i+1}</span><span>${esc(s)}</span></div>`).join('') || '<div style="color:var(--text-muted);font-size:.75rem">No next steps.</div>';
}
function pathRow(path, status) {
  const c = status===200?'#4ade80':String(status).startsWith('3')?'#fbbf24':'var(--red)';
  return `<div class="path-row"><span style="font-family:monospace;color:var(--text)">${esc(String(path))}</span><span class="path-status" style="color:${c}">${esc(String(status))}</span></div>`;
}
function updateStats(d) {
  const r = d.recon || d;
  document.getElementById('stat-ip').textContent = r.ip||'—';
  document.getElementById('stat-status').textContent = r.status_code||'—';
  const ssl = r.ssl;
  document.getElementById('stat-ssl').textContent = ssl ? (ssl.valid?`✓ ${ssl.days_remaining}d`:'✗ invalid') : '—';
}
function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Chat ──────────────────────────────────────────────────────────────────────
const CHAT_SYSTEM = `You are a red team security assistant embedded in CyberTools API — a free security utility API for bug bounty hunters. Answer questions about cybersecurity, bug bounty, penetration testing, web security, and how to use CyberTools API. Give specific, actionable, expert-level advice. Keep responses concise but complete.`;

function now(){ return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
function botBubble(text, ts) {
  return `<div class="chat-msg-bot"><div class="bot-avatar">⌖</div><div><div class="bot-name">CyberTools AI</div><div class="bot-bubble">${esc(text)}</div><div class="chat-ts">${ts}</div></div></div>`;
}
function userBubble(text, ts) {
  return `<div class="chat-msg-user"><div><div class="bubble">${esc(text)}</div><div class="ts">${ts}</div></div></div>`;
}
function typingBubble() {
  return `<div class="chat-msg-bot" id="typing-indicator"><div class="bot-avatar">⌖</div><div><div class="bot-name">CyberTools AI</div><div class="bot-bubble" style="padding:0"><div class="typing-dots"><span class="dot-anim" style="animation-delay:0s"></span><span class="dot-anim" style="animation-delay:.18s"></span><span class="dot-anim" style="animation-delay:.36s"></span></div></div></div></div>`;
}

function toggleChat() {
  _chatOpen = !_chatOpen;
  const popup = document.getElementById('chat-popup');
  const btn   = document.getElementById('chat-btn');
  popup.classList.toggle('hidden', !_chatOpen);
  btn.classList.toggle('open', _chatOpen);
  btn.textContent = _chatOpen ? '✕' : '⌖';
  if(_chatOpen) setTimeout(()=>document.getElementById('chat-input').focus(),80);
}

function clearChat() {
  _chatHistory = [];
  const msgs = document.getElementById('chat-messages');
  msgs.innerHTML = botBubble("Chat cleared. What do you want to know?", now());
}

function chatKey(e) {
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); chatSend(); }
}

async function chatSend() {
  if(_chatThinking) return;
  const input = document.getElementById('chat-input');
  const q = input.value.trim();
  if(!q) return;
  input.value = '';

  const msgs = document.getElementById('chat-messages');
  msgs.insertAdjacentHTML('beforeend', userBubble(q, now()));
  msgs.insertAdjacentHTML('beforeend', typingBubble());
  msgs.lastElementChild.scrollIntoView({behavior:'smooth'});
  _chatThinking = true;
  document.getElementById('chat-send').disabled = true;

  _chatHistory.push({role:'user', content:q});

  let reply;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:CHAT_SYSTEM,messages:_chatHistory})
    });
    const data = await res.json();
    reply = data.content?.find(b=>b.type==='text')?.text || 'No response.';
  } catch(e) {
    reply = 'Connection error. Make sure the API is running.';
  }

  _chatHistory.push({role:'assistant',content:reply});
  const typing = document.getElementById('typing-indicator');
  if(typing) typing.remove();
  msgs.insertAdjacentHTML('beforeend', botBubble(reply, now()));
  msgs.lastElementChild.scrollIntoView({behavior:'smooth'});
  _chatThinking = false;
  document.getElementById('chat-send').disabled = false;
}
</script>
