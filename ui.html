<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CyberTools API</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #080b0f;
        --surface: #0c1117;
        --surface2: #111820;
        --border: rgba(130, 255, 80, 0.1);
        --border-h: rgba(130, 255, 80, 0.3);
        --lime: #82ff50;
        --lime-dim: rgba(130, 255, 80, 0.08);
        --lime-glow: rgba(130, 255, 80, 0.2);
        --red: #ff3b3b;
        --red-dim: rgba(255, 59, 59, 0.1);
        --text: #d4e0cc;
        --text-dim: #6a8060;
        --text-muted: #3a4d30;
        --radius: 10px;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "JetBrains Mono", monospace;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* Scanline overlay */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.03) 2px,
          rgba(0, 0, 0, 0.03) 4px
        );
        pointer-events: none;
        z-index: 999;
      }

      /* Grid bg */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(130, 255, 80, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(130, 255, 80, 0.02) 1px, transparent 1px);
        background-size: 32px 32px;
        pointer-events: none;
        z-index: 0;
      }

      /* ── Navbar ── */
      nav {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(8, 11, 15, 0.92);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
        padding: 12px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .logo {
        font-family: "Syne", sans-serif;
        font-size: 1rem;
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--lime);
        text-shadow: 0 0 20px var(--lime-glow);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .logo-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--lime);
        box-shadow: 0 0 10px var(--lime);
        animation: blink 2s step-end infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.2;
        }
      }

      .nav-links {
        display: flex;
        gap: 6px;
      }
      .nav-link {
        padding: 5px 12px;
        border-radius: 4px;
        font-size: 0.68rem;
        color: var(--text-dim);
        text-decoration: none;
        border: 1px solid transparent;
        letter-spacing: 1px;
        text-transform: uppercase;
        transition: all 0.15s;
      }
      .nav-link:hover {
        color: var(--lime);
        border-color: var(--border);
        background: var(--lime-dim);
      }
      .nav-link.active {
        color: var(--lime);
        border-color: var(--border-h);
        background: var(--lime-dim);
      }

      /* ── App layout ── */
      .app {
        display: grid;
        grid-template-columns: 320px 1fr;
        min-height: calc(100vh - 49px);
        position: relative;
        z-index: 1;
      }

      /* ── Left panel ── */
      .left {
        border-right: 1px solid var(--border);
        padding: 24px 20px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        position: sticky;
        top: 49px;
        height: calc(100vh - 49px);
        overflow-y: auto;
      }
      .left::-webkit-scrollbar {
        width: 3px;
      }
      .left::-webkit-scrollbar-thumb {
        background: var(--border-h);
        border-radius: 2px;
      }

      .panel-label {
        font-size: 0.6rem;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 4px;
      }

      .target-input {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 10px 14px;
        color: var(--lime);
        font-family: "JetBrains Mono", monospace;
        font-size: 0.82rem;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        caret-color: var(--lime);
      }
      .target-input:focus {
        border-color: var(--border-h);
        box-shadow:
          0 0 0 3px var(--lime-dim),
          0 0 20px var(--lime-dim);
      }
      .target-input::placeholder {
        color: var(--text-muted);
      }

      .btn-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .btn-full {
        grid-column: 1 / -1;
      }

      .action-btn {
        padding: 10px 8px;
        border-radius: var(--radius);
        font-family: "JetBrains Mono", monospace;
        font-size: 0.72rem;
        letter-spacing: 1px;
        text-transform: uppercase;
        cursor: pointer;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-dim);
        transition: all 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
      .action-btn:hover {
        border-color: var(--border-h);
        color: var(--lime);
        background: var(--lime-dim);
        box-shadow: 0 0 12px var(--lime-dim);
      }
      .action-btn.primary {
        background: var(--lime-dim);
        border-color: var(--border-h);
        color: var(--lime);
      }
      .action-btn.primary:hover {
        background: rgba(130, 255, 80, 0.15);
        box-shadow: 0 0 20px var(--lime-glow);
      }
      .action-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .divider {
        height: 1px;
        background: var(--border);
        margin: 4px 0;
      }

      /* Payload type select */
      .select-input {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 8px 12px;
        color: var(--text-dim);
        font-family: "JetBrains Mono", monospace;
        font-size: 0.75rem;
        outline: none;
        cursor: pointer;
        transition: border-color 0.2s;
      }
      .select-input:focus {
        border-color: var(--border-h);
      }
      .select-input option {
        background: var(--surface2);
      }

      /* Chat input */
      .chat-row {
        display: flex;
        gap: 6px;
      }
      .chat-input {
        flex: 1;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 8px 12px;
        color: var(--text);
        font-family: "JetBrains Mono", monospace;
        font-size: 0.75rem;
        outline: none;
        transition: border-color 0.2s;
      }
      .chat-input:focus {
        border-color: var(--border-h);
      }
      .chat-input::placeholder {
        color: var(--text-muted);
      }

      /* Stat pills */
      .stats {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .stat-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 10px;
        background: var(--surface2);
        border-radius: 6px;
        border: 1px solid var(--border);
        font-size: 0.68rem;
      }
      .stat-key {
        color: var(--text-muted);
        letter-spacing: 1px;
        text-transform: uppercase;
      }
      .stat-val {
        color: var(--lime);
        font-weight: 500;
      }

      /* ── Right panel ── */
      .right {
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        overflow-y: auto;
      }

      /* ── Loading overlay ── */
      .loading-box {
        display: none;
        background: var(--surface);
        border: 1px solid var(--border-h);
        border-radius: var(--radius);
        padding: 24px;
        box-shadow: 0 0 40px var(--lime-dim);
      }
      .loading-box.show {
        display: block;
      }
      .loading-title {
        font-family: "Syne", sans-serif;
        font-size: 0.8rem;
        font-weight: 800;
        color: var(--lime);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 16px;
      }
      .loading-steps {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .loading-step {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.75rem;
        color: var(--text-muted);
        transition: color 0.3s;
      }
      .loading-step.active {
        color: var(--lime);
      }
      .loading-step.done {
        color: var(--text-dim);
      }
      .step-icon {
        width: 16px;
        text-align: center;
        flex-shrink: 0;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .step-icon.spinning {
        display: inline-block;
        animation: spin 1s linear infinite;
      }

      /* ── Result panel ── */
      .result-panel {
        display: none;
        flex-direction: column;
        gap: 16px;
      }
      .result-panel.show {
        display: flex;
      }

      .result-section {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        animation: fadeIn 0.3s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .result-section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 16px;
        background: rgba(130, 255, 80, 0.04);
        border-bottom: 1px solid var(--border);
        font-size: 0.68rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--lime);
        cursor: pointer;
        user-select: none;
      }
      .result-section-header:hover {
        background: rgba(130, 255, 80, 0.07);
      }
      .collapse-icon {
        transition: transform 0.2s;
      }
      .result-section.collapsed .collapse-icon {
        transform: rotate(-90deg);
      }
      .result-section.collapsed .result-section-body {
        display: none;
      }

      .result-section-body {
        padding: 16px;
      }

      /* Smart summary cards */
      .summary-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .summary-item {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 8px 10px;
        background: var(--surface2);
        border-radius: 6px;
        font-size: 0.78rem;
        line-height: 1.5;
        color: var(--text);
        animation: fadeIn 0.3s ease both;
      }
      .summary-item .si-icon {
        flex-shrink: 0;
        margin-top: 1px;
      }
      .summary-item.warn {
        border-left: 2px solid var(--red);
      }
      .summary-item.ok {
        border-left: 2px solid var(--lime);
      }

      /* Next steps */
      .steps-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .step-item {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 8px 10px;
        background: var(--surface2);
        border-radius: 6px;
        border: 1px solid var(--border);
        font-size: 0.76rem;
        line-height: 1.5;
        color: var(--text-dim);
        animation: fadeIn 0.3s ease both;
        transition: border-color 0.2s;
      }
      .step-item:hover {
        border-color: var(--border-h);
        color: var(--text);
      }
      .step-num {
        font-size: 0.65rem;
        font-weight: 500;
        color: var(--lime);
        min-width: 18px;
        padding-top: 1px;
      }

      /* Key-value grid */
      .kv-grid {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 6px 16px;
        font-size: 0.76rem;
      }
      .kv-key {
        color: var(--text-muted);
        letter-spacing: 1px;
        white-space: nowrap;
      }
      .kv-val {
        color: var(--text);
        word-break: break-all;
      }
      .kv-val.good {
        color: var(--lime);
      }
      .kv-val.bad {
        color: var(--red);
      }

      /* Payload list */
      .payload-list {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .payload-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 8px 12px;
        background: var(--surface2);
        border-radius: 6px;
        border: 1px solid var(--border);
        font-size: 0.75rem;
        cursor: pointer;
        transition: all 0.15s;
        animation: fadeIn 0.3s ease both;
      }
      .payload-item:hover {
        border-color: var(--border-h);
        background: var(--lime-dim);
      }
      .payload-code {
        color: var(--lime);
        font-family: "JetBrains Mono", monospace;
        flex: 1;
      }
      .payload-label {
        color: var(--text-muted);
        font-size: 0.65rem;
        white-space: nowrap;
      }
      .payload-copy {
        color: var(--text-muted);
        font-size: 0.65rem;
        flex-shrink: 0;
      }
      .payload-item:hover .payload-copy {
        color: var(--lime);
      }

      /* Paths table */
      .paths-table {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .path-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 6px 10px;
        background: var(--surface2);
        border-radius: 5px;
        font-size: 0.74rem;
        animation: fadeIn 0.2s ease both;
      }
      .path-name {
        flex: 1;
        color: var(--text-dim);
        font-family: "JetBrains Mono", monospace;
      }
      .path-status {
        font-size: 0.7rem;
        padding: 2px 8px;
        border-radius: 4px;
        font-weight: 500;
      }
      .status-200 {
        background: rgba(130, 255, 80, 0.1);
        color: var(--lime);
      }
      .status-301 {
        background: rgba(255, 200, 50, 0.1);
        color: #ffc832;
      }
      .status-302 {
        background: rgba(255, 200, 50, 0.1);
        color: #ffc832;
      }
      .status-403 {
        background: rgba(255, 59, 59, 0.1);
        color: var(--red);
      }
      .status-500 {
        background: rgba(255, 100, 50, 0.1);
        color: #ff6432;
      }

      /* Raw JSON toggle */
      .json-toggle {
        font-size: 0.65rem;
        color: var(--text-muted);
        cursor: pointer;
        letter-spacing: 1px;
        text-transform: uppercase;
        padding: 2px 6px;
        border-radius: 4px;
        border: 1px solid transparent;
        transition: all 0.15s;
      }
      .json-toggle:hover {
        border-color: var(--border);
        color: var(--text-dim);
      }
      .json-raw {
        display: none;
        margin-top: 12px;
        background: #050709;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 12px;
        font-size: 0.72rem;
        color: var(--text-dim);
        white-space: pre-wrap;
        word-break: break-all;
        max-height: 300px;
        overflow-y: auto;
        line-height: 1.6;
      }
      .json-raw.show {
        display: block;
        animation: fadeIn 0.2s ease;
      }
      .json-raw::-webkit-scrollbar {
        width: 3px;
      }
      .json-raw::-webkit-scrollbar-thumb {
        background: var(--border-h);
        border-radius: 2px;
      }

      /* Copy toast */
      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        padding: 10px 18px;
        background: var(--surface);
        border: 1px solid var(--border-h);
        border-radius: 8px;
        font-size: 0.75rem;
        color: var(--lime);
        box-shadow: 0 4px 20px var(--lime-dim);
        z-index: 1000;
        opacity: 0;
        transform: translateY(8px);
        transition: all 0.2s;
        pointer-events: none;
      }
      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      /* Welcome state */
      .welcome {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 60vh;
        gap: 16px;
        color: var(--text-muted);
        text-align: center;
      }
      .welcome-icon {
        font-size: 3rem;
        opacity: 0.3;
      }
      .welcome-title {
        font-family: "Syne", sans-serif;
        font-size: 1rem;
        font-weight: 800;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--text-muted);
      }
      .welcome-sub {
        font-size: 0.72rem;
        line-height: 1.7;
        max-width: 300px;
      }

      /* Responsive */
      @media (max-width: 700px) {
        .app {
          grid-template-columns: 1fr;
        }
        .left {
          position: static;
          height: auto;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="logo">
        <span class="logo-dot"></span>
        CyberTools
      </div>
      <div class="nav-links">
        <a href="#recon" class="nav-link" onclick="focusInput()">Recon</a>
        <a href="/docs" class="nav-link active">API Docs ↗</a>
      </div>
    </nav>

    <div class="app">
      <!-- ── Left: Controls ── -->
      <div class="left">
        <div>
          <div class="panel-label">Target</div>
          <input
            class="target-input"
            id="target"
            type="text"
            placeholder="domain.com or https://..."
            spellcheck="false"
            onkeydown="if (event.key === 'Enter') runWorkflow();"
          />
        </div>

        <div>
          <div class="panel-label" style="margin-bottom: 10px">Actions</div>
          <div class="btn-grid">
            <button class="action-btn primary btn-full" onclick="runWorkflow()">
              ⚡ Full Workflow
            </button>
            <button class="action-btn" onclick="runRecon()">🔍 Recon</button>
            <button class="action-btn" onclick="runAnalyze()">
              🔗 Analyze URL
            </button>
            <button class="action-btn" onclick="runBBScan()">🎯 BB Scan</button>
            <button class="action-btn" onclick="runLastScan()">
              💾 Last Scan
            </button>
          </div>
        </div>

        <div class="divider"></div>

        <div>
          <div class="panel-label" style="margin-bottom: 8px">Payloads</div>
          <select class="select-input" id="payload-type">
            <option value="xss">XSS</option>
            <option value="sqli">SQLi</option>
            <option value="lfi">LFI</option>
            <option value="ssrf">SSRF</option>
          </select>
          <button
            class="action-btn"
            style="margin-top: 8px; width: 100%"
            onclick="runPayloads()"
          >
            📋 Get Payloads
          </button>
        </div>

        <div class="divider"></div>

        <div>
          <div class="panel-label" style="margin-bottom: 8px">
            Ask Assistant
          </div>
          <div class="chat-row">
            <input
              class="chat-input"
              id="chat-q"
              type="text"
              placeholder="What should I test?"
              onkeydown="if (event.key === 'Enter') runChat();"
            />
            <button
              class="action-btn"
              onclick="runChat()"
              style="white-space: nowrap; padding: 8px 12px"
            >
              →
            </button>
          </div>
        </div>

        <div class="divider"></div>

        <div class="stats" id="stats-panel" style="display: none">
          <div class="panel-label" style="margin-bottom: 4px">
            Last Scan Stats
          </div>
          <div class="stat-row">
            <span class="stat-key">Target</span
            ><span class="stat-val" id="stat-target">—</span>
          </div>
          <div class="stat-row">
            <span class="stat-key">IP</span
            ><span class="stat-val" id="stat-ip">—</span>
          </div>
          <div class="stat-row">
            <span class="stat-key">Status</span
            ><span class="stat-val" id="stat-status">—</span>
          </div>
          <div class="stat-row">
            <span class="stat-key">SSL</span
            ><span class="stat-val" id="stat-ssl">—</span>
          </div>
        </div>
      </div>

      <!-- ── Right: Output ── -->
      <div class="right" id="output">
        <!-- Welcome state -->
        <div class="welcome" id="welcome">
          <div class="welcome-icon">⚡</div>
          <div class="welcome-title">CyberTools</div>
          <div class="welcome-sub">
            Enter a domain or URL on the left, then hit
            <span style="color: var(--lime)">Full Workflow</span> to start
            recon.
          </div>
        </div>

        <!-- Loading -->
        <div class="loading-box" id="loading-box">
          <div class="loading-title" id="loading-title">Scanning...</div>
          <div class="loading-steps" id="loading-steps"></div>
        </div>

        <!-- Results -->
        <div class="result-panel" id="result-panel"></div>
      </div>
    </div>

    <div class="toast" id="toast">Copied!</div>

    <script>
      // ── State ──
      let _lastData = null;

      // ── Helpers ────────────────────────────────────────────────────────────────────

      function focusInput() {
        document.getElementById("target").focus();
      }

      function getTarget() {
        return document.getElementById("target").value.trim();
      }

      function toast(msg = "Copied!") {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 1800);
      }

      function copyText(text) {
        navigator.clipboard
          .writeText(text)
          .then(() => toast("Copied!"))
          .catch(() => toast("Copy failed"));
      }

      // ── Loading ────────────────────────────────────────────────────────────────────

      const STEP_SETS = {
        recon: [
          "Resolving DNS...",
          "Probing HTTP headers...",
          "Checking SSL certificate...",
          "Analyzing tech stack...",
        ],
        analyze: [
          "Following redirect chain...",
          "Inspecting final headers...",
          "Detecting misconfigurations...",
        ],
        "bb-scan": [
          "Preparing path list...",
          "Probing concurrently...",
          "Collecting results...",
        ],
        workflow: [
          "Resolving DNS...",
          "Probing headers & SSL...",
          "Following redirect chain...",
          "Scanning 30+ paths...",
          "Merging results...",
        ],
        payloads: ["Loading payloads..."],
        "last-scan": ["Fetching last scan..."],
        chat: ["Processing question..."],
      };

      let _stepTimer = null;

      function startLoading(type, title) {
        document.getElementById("welcome").style.display = "none";
        document.getElementById("result-panel").classList.remove("show");
        document.getElementById("result-panel").innerHTML = "";
        const box = document.getElementById("loading-box");
        box.classList.add("show");
        document.getElementById("loading-title").textContent = title;

        const steps = STEP_SETS[type] || ["Working..."];
        const container = document.getElementById("loading-steps");
        container.innerHTML = steps
          .map(
            (s, i) =>
              `<div class="loading-step" id="lstep-${i}"><span class="step-icon" id="lstep-icon-${i}">○</span>${s}</div>`,
          )
          .join("");

        let i = 0;
        function tick() {
          if (i > 0) {
            document
              .getElementById(`lstep-${i - 1}`)
              .classList.remove("active");
            document.getElementById(`lstep-${i - 1}`).classList.add("done");
            document.getElementById(`lstep-icon-${i - 1}`).textContent = "✓";
            document
              .getElementById(`lstep-icon-${i - 1}`)
              .classList.remove("spinning");
          }
          if (i < steps.length) {
            const el = document.getElementById(`lstep-${i}`);
            el.classList.add("active");
            const icon = document.getElementById(`lstep-icon-${i}`);
            icon.textContent = "◌";
            icon.classList.add("spinning");
            i++;
            _stepTimer = setTimeout(tick, 900);
          }
        }
        tick();
      }

      function stopLoading() {
        clearTimeout(_stepTimer);
        document.getElementById("loading-box").classList.remove("show");
      }

      // ── Render ─────────────────────────────────────────────────────────────────────

      function showResults(sections) {
        stopLoading();
        const panel = document.getElementById("result-panel");
        panel.innerHTML = "";
        panel.classList.add("show");
        sections.forEach((s, i) => {
          panel.appendChild(buildSection(s, i));
        });
      }

      function buildSection({ title, content, raw }, idx) {
        const sec = document.createElement("div");
        sec.className = "result-section";
        sec.innerHTML = `
    <div class="result-section-header" onclick="this.parentElement.classList.toggle('collapsed')">
      <span>${title}</span>
      <div style="display:flex;gap:10px;align-items:center">
        ${raw ? `<span class="json-toggle" onclick="event.stopPropagation();toggleRaw(${idx})">{ }</span>` : ""}
        <span class="collapse-icon">▼</span>
      </div>
    </div>
    <div class="result-section-body">${content}</div>
    ${raw ? `<div class="json-raw" id="raw-${idx}">${escHtml(JSON.stringify(raw, null, 2))}</div>` : ""}
  `;
        return sec;
      }

      function toggleRaw(idx) {
        document.getElementById(`raw-${idx}`).classList.toggle("show");
      }

      function escHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      // ── Render helpers ─────────────────────────────────────────────────────────────

      function renderSummary(items) {
        if (!items || !items.length)
          return '<div style="color:var(--text-muted);font-size:.75rem">No summary data.</div>';
        return `<div class="summary-list">${items
          .map((line, i) => {
            const isWarn =
              /missing|fail|vuln|error|risk|exposed|warning|downgrade|clickjack|wildcard/i.test(
                line,
              );
            const icon = isWarn ? "⚠" : "✓";
            const cls = isWarn ? "warn" : "ok";
            return `<div class="summary-item ${cls}" style="animation-delay:${i * 0.05}s"><span class="si-icon">${icon}</span><span>${escHtml(line)}</span></div>`;
          })
          .join("")}</div>`;
      }

      function renderNextSteps(items) {
        if (!items || !items.length) return "";
        return `<div class="steps-list">${items
          .map(
            (s, i) =>
              `<div class="step-item" style="animation-delay:${i * 0.05}s"><span class="step-num">${i + 1}.</span><span>${escHtml(s)}</span></div>`,
          )
          .join("")}</div>`;
      }

      function renderKV(pairs) {
        return `<div class="kv-grid">${pairs
          .map(
            ([k, v, cls]) =>
              `<span class="kv-key">${escHtml(String(k))}</span><span class="kv-val ${cls || ""}">${escHtml(String(v ?? "—"))}</span>`,
          )
          .join("")}</div>`;
      }

      function renderPaths(paths) {
        if (!paths || !paths.length)
          return '<div style="color:var(--text-muted);font-size:.75rem">No interesting paths found.</div>';
        return `<div class="paths-table">${paths
          .map((p, i) => {
            const s = p.status;
            const cls = `status-${s}`;
            return `<div class="path-row" style="animation-delay:${i * 0.04}s">
      <span class="path-name">${escHtml(p.path)}</span>
      <span class="path-status ${cls}">${s}</span>
    </div>`;
          })
          .join("")}</div>`;
      }

      function renderPayloads(items) {
        return `<div class="payload-list">${items
          .map((item, i) => {
            const p = typeof item === "object" ? item.payload : item;
            const lbl = typeof item === "object" ? item.label : "";
            return `<div class="payload-item" style="animation-delay:${i * 0.04}s" onclick="copyText('${p.replace(/'/g, "\\'")}')">
      <span class="payload-code">${escHtml(p)}</span>
      <span class="payload-label">${escHtml(lbl)}</span>
      <span class="payload-copy">copy</span>
    </div>`;
          })
          .join("")}</div>`;
      }

      function renderHints(items) {
        if (!items || !items.length) return "";
        return `<div class="summary-list">${items
          .map(
            (h, i) =>
              `<div class="summary-item warn" style="animation-delay:${i * 0.04}s"><span class="si-icon">→</span><span>${escHtml(h)}</span></div>`,
          )
          .join("")}</div>`;
      }

      function renderChat(data) {
        const lines = data.response || [];
        return `<div class="summary-list">${lines
          .map(
            (l, i) =>
              `<div class="summary-item ok" style="animation-delay:${i * 0.05}s"><span class="si-icon">→</span><span>${escHtml(l)}</span></div>`,
          )
          .join(
            "",
          )}${data.tip ? `<div style="margin-top:8px;font-size:.7rem;color:var(--text-muted)">${escHtml(data.tip)}</div>` : ""}</div>`;
      }

      // ── Update sidebar stats ────────────────────────────────────────────────────────

      function updateStats(data) {
        const r = data.recon || data;
        document.getElementById("stats-panel").style.display = "flex";
        document.getElementById("stat-target").textContent =
          r.domain || data.target || "—";
        document.getElementById("stat-ip").textContent = r.ip || "—";
        document.getElementById("stat-status").textContent =
          r.status_code || r.final_status || "—";
        const ssl = r.ssl;
        document.getElementById("stat-ssl").textContent = ssl
          ? ssl.valid
            ? `✓ ${ssl.days_remaining}d`
            : "✗ invalid"
          : "—";
      }

      // ── API calls ──────────────────────────────────────────────────────────────────

      async function _fetch(url, opts = {}) {
        const res = await fetch(url, opts);
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || JSON.stringify(data));
        return data;
      }

      function showError(msg) {
        stopLoading();
        const panel = document.getElementById("result-panel");
        panel.innerHTML = `<div class="result-section">
    <div class="result-section-header"><span>⚠ Error</span></div>
    <div class="result-section-body">
      <div class="summary-item warn"><span class="si-icon">✗</span><span>${escHtml(msg)}</span></div>
    </div>
  </div>`;
        panel.classList.add("show");
      }

      // ── Commands ───────────────────────────────────────────────────────────────────

      async function runRecon() {
        const t = getTarget();
        if (!t) return;
        startLoading("recon", `Recon: ${t}`);
        try {
          const d = await _fetch(`/recon?domain=${encodeURIComponent(t)}`);
          _lastData = d;
          updateStats(d);
          showResults([
            {
              title: "◉ Host Info",
              raw: d,
              content:
                renderKV([
                  ["Domain", d.domain],
                  ["IP", d.ip, "good"],
                  ["Protocol", (d.protocol || "").toUpperCase()],
                  [
                    "Status",
                    d.status_code,
                    d.status_code < 400 ? "good" : "bad",
                  ],
                ]) +
                (d.ssl
                  ? `<div style="margin-top:12px">` +
                    renderKV([
                      [
                        "SSL Valid",
                        d.ssl.valid ? "Yes" : "No",
                        d.ssl.valid ? "good" : "bad",
                      ],
                      ["Expires", d.ssl.expires],
                      [
                        "Days Left",
                        d.ssl.days_remaining,
                        d.ssl.days_remaining > 30 ? "good" : "bad",
                      ],
                      ["Issuer", d.ssl.issuer],
                    ]) +
                    `</div>`
                  : ""),
            },
            {
              title: "◉ Security Headers",
              content: d.missing_security_headers?.length
                ? renderHints(
                    d.missing_security_headers.map((h) => `Missing: ${h}`),
                  )
                : '<div class="summary-item ok"><span>✓</span><span>All major security headers present.</span></div>',
            },
            {
              title: "◉ Tech Stack",
              content: d.tech_hints?.length
                ? renderHints(d.tech_hints)
                : '<div style="color:var(--text-muted);font-size:.75rem">No tech hints detected.</div>',
            },
            {
              title: "◉ Smart Summary",
              content: renderSummary(d.smart_summary),
            },
            { title: "◉ Next Steps", content: renderNextSteps(d.next_steps) },
          ]);
        } catch (e) {
          showError(e.message);
        }
      }

      async function runAnalyze() {
        let t = getTarget();
        if (!t) return;
        if (!t.startsWith("http")) t = "https://" + t;
        startLoading("analyze", `Analyzing: ${t}`);
        try {
          const d = await _fetch(`/analyze-url?url=${encodeURIComponent(t)}`);
          _lastData = d;
          showResults([
            {
              title: "◉ Redirect Chain",
              raw: d,
              content: renderPaths(
                d.redirect_chain?.map((r) => ({
                  path: r.url,
                  status: r.status,
                })),
              ),
            },
            {
              title: "◉ Misconfigurations",
              content: d.misconfig_hints?.length
                ? renderHints(d.misconfig_hints)
                : '<div class="summary-item ok"><span>✓</span><span>No obvious misconfigurations found.</span></div>',
            },
            {
              title: "◉ Smart Summary",
              content: renderSummary(d.smart_summary),
            },
            { title: "◉ Next Steps", content: renderNextSteps(d.next_steps) },
          ]);
        } catch (e) {
          showError(e.message);
        }
      }

      async function runBBScan() {
        let t = getTarget();
        if (!t) return;
        if (!t.startsWith("http")) t = "https://" + t;
        startLoading("bb-scan", `BB Scan: ${t}`);
        try {
          const d = await _fetch(`/bb-scan?url=${encodeURIComponent(t)}`);
          _lastData = d;
          showResults([
            {
              title: `◉ Interesting Paths (${d.interesting_paths?.length || 0})`,
              raw: d,
              content: renderPaths(d.interesting_paths),
            },
            { title: "◉ All Results", content: renderPaths(d.all_results) },
            {
              title: "◉ Bug Bounty Hints",
              content: renderHints(d.bug_bounty_hints),
            },
            { title: "◉ Next Steps", content: renderNextSteps(d.next_steps) },
          ]);
        } catch (e) {
          showError(e.message);
        }
      }

      async function runWorkflow() {
        const t = getTarget();
        if (!t) return;
        startLoading("workflow", `Workflow: ${t}`);
        try {
          const d = await _fetch(`/workflow?target=${encodeURIComponent(t)}`);
          _lastData = d;
          updateStats(d);
          showResults([
            {
              title: `◉ Full Workflow — ${d.target} (${d.elapsed_seconds}s)`,
              raw: d,
              content: renderKV([
                ["Target", d.target],
                ["Elapsed", `${d.elapsed_seconds}s`],
              ]),
            },
            {
              title: "◉ Smart Summary",
              content: renderSummary(d.smart_summary),
            },
            {
              title: `◉ Interesting Paths (${d.bb_scan?.interesting_paths?.length || 0})`,
              content: renderPaths(d.bb_scan?.interesting_paths),
            },
            {
              title: "◉ Misconfigurations",
              content: d.analysis?.misconfig_hints?.length
                ? renderHints(d.analysis.misconfig_hints)
                : '<div class="summary-item ok"><span>✓</span><span>No misconfigurations detected.</span></div>',
            },
            { title: "◉ Next Steps", content: renderNextSteps(d.next_steps) },
          ]);
        } catch (e) {
          showError(e.message);
        }
      }

      async function runPayloads() {
        const type = document.getElementById("payload-type").value;
        startLoading("payloads", `Payloads: ${type.toUpperCase()}`);
        try {
          const d = await _fetch(`/payloads?type=${type}`);
          showResults([
            {
              title: `◉ ${type.toUpperCase()} Payloads (${d.count})`,
              content:
                `<div style="font-size:.72rem;color:var(--text-muted);margin-bottom:12px">${escHtml(d.description)} · Click any payload to copy.</div>` +
                renderPayloads(d.payloads),
            },
            { title: "◉ Usage Tips", content: renderNextSteps(d.usage_tips) },
          ]);
        } catch (e) {
          showError(e.message);
        }
      }

      async function runLastScan() {
        startLoading("last-scan", "Last Scan");
        try {
          const d = await _fetch("/last-scan");
          showResults([
            {
              title: `◉ Last Scan — ${d.key}`,
              raw: d.data,
              content: renderKV([
                ["Target", d.key],
                ["Time", d.timestamp],
              ]),
            },
            {
              title: "◉ Summary",
              content: renderSummary(
                d.data?.smart_summary || d.data?.recon?.smart_summary,
              ),
            },
          ]);
        } catch (e) {
          showError(e.message);
        }
      }

      async function runChat() {
        const q = document.getElementById("chat-q").value.trim();
        if (!q) return;
        startLoading("chat", `Ask: ${q}`);
        try {
          const res = await fetch("/chat-assist", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question: q }),
          });
          const d = await res.json();
          if (!res.ok) throw new Error(d.detail || JSON.stringify(d));
          showResults([{ title: `◉ ${q}`, content: renderChat(d) }]);
          document.getElementById("chat-q").value = "";
        } catch (e) {
          showError(e.message);
        }
      }
    </script>
  </body>
</html>
